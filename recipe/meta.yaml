{% set name = "pysmspp" %}
{% set version = "0.0.3" %}
{% set python_min = "3.12" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: edcd6ceed9ef9a93ff5267eb69be956eda03b5bc1f05134213b99dce5b734ac9

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - pandas >=0.24
    - netcdf4
    - psutil
    - matplotlib >=3.0

test:
  imports:
    - pysmspp
  requires:
    - python {{ python_min }}
    - pip
  commands:
    - pip check
    - python -c "import pysmspp; model = pysmspp.SMSNetwork()"

about:
  home: https://github.com/SPSUnipi/pySMSpp
  summary: 'Python interface for SMS++'
  description: |
    This package aims at providing a python interface to create SMS++ models using a simple python interface.
    The package aims to support:
    - Read/write operations of SMS++ models from/to netCDF4 files
    - Add/remove/edit operations model components
    - Execution of SMS++ models
    - Reading SMS++ results as netCDF4 files
  license: GPL-3.0-only
  license_family: GPL
  license_file: LICENSE
  doc_url: https://pysmspp.readthedocs.io/
  dev_url: https://github.com/SPSUnipi/pySMSpp

extra:
  recipe-maintainers:
    - davide-f
